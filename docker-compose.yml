version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        CMD_PATH: ./cmd/api
    environment:
      - REDIS_URL=redis://redis:6379
      - HTTP_ADDR=:8080
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        CMD_PATH: ./cmd/scheduler
    environment:
      - REDIS_URL=redis://redis:6379
      - POLL_INTERVAL=100ms
      - BATCH_SIZE=100
      - LOCK_TTL=5m
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        CMD_PATH: ./cmd/worker
    environment:
      - REDIS_URL=redis://redis:6379
      - POLL_INTERVAL=100ms
      - BATCH_SIZE=100
      - LOCK_TTL=5m
      - MAX_RETRIES=5
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
      - scheduler
      - worker
    profiles:
      - monitoring

volumes:
  redis_data:
  prometheus_data:

networks:
  default:
    name: reschedule-network
