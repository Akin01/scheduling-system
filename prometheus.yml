global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics

  - job_name: 'scheduler'
    static_configs:
      - targets: ['scheduler:8080']
    metrics_path: /metrics

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:8080']
    metrics_path: /metrics
